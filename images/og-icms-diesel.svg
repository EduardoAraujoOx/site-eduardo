<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Impactos da proposta de isenção de ICMS do diesel para Estados e Municípios</title>
  <desc id="desc">Gráfico de barras horizontal destacando as unidades federativas com maiores perdas líquidas estimadas.</desc>

  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="36" y="36" width="1128" height="558" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Header -->
  <text x="72" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">ESTUDO · FINANÇAS PÚBLICAS · 2026</text>
  <text x="72" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0F172A">Impactos da proposta de isenção de ICMS do diesel</text>
  <text x="72" y="186" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0F172A">para Estados e Municípios</text>

  <text x="72" y="228" font-family="Arial, sans-serif" font-size="20" fill="#334155">Perda líquida estimada por UF (R$ milhões)</text>

  <!-- Axis -->
  <line x1="180" y1="268" x2="180" y2="542" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Bars -->
  <text x="72" y="302" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">SP</text>
  <rect x="180" y="280" width="520" height="30" rx="6" fill="url(#barGrad)"/>
  <text x="716" y="302" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0F172A">R$ 606,2 mi</text>

  <text x="72" y="348" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">MG</text>
  <rect x="180" y="326" width="322" height="30" rx="6" fill="url(#barGrad)"/>
  <text x="518" y="348" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0F172A">R$ 376,0 mi</text>

  <text x="72" y="394" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">PR</text>
  <rect x="180" y="372" width="245" height="30" rx="6" fill="url(#barGrad)"/>
  <text x="441" y="394" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0F172A">R$ 285,8 mi</text>

  <text x="72" y="440" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">MT</text>
  <rect x="180" y="418" width="157" height="30" rx="6" fill="url(#barGrad)"/>
  <text x="353" y="440" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0F172A">R$ 183,5 mi</text>

  <text x="72" y="486" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">RS</text>
  <rect x="180" y="464" width="153" height="30" rx="6" fill="url(#barGrad)"/>
  <text x="349" y="486" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0F172A">R$ 178,0 mi</text>

  <!-- Highlight box -->
  <rect x="780" y="280" width="336" height="214" rx="14" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="808" y="326" font-family="Arial, sans-serif" font-size="18" fill="#1E3A8A">Impacto líquido total (2 meses)</text>
  <text x="808" y="388" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1D4ED8">R$ 3,0 bi</text>
  <text x="808" y="430" font-family="Arial, sans-serif" font-size="18" fill="#334155">com 50% de compensação federal</text>

  <!-- Footer -->
  <line x1="72" y1="538" x2="1128" y2="538" stroke="#E2E8F0" stroke-width="2"/>
  <text x="72" y="572" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1E293B">eduardoreisaraujo.com.br</text>
</svg>
