<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Responder — Método e Evidência em Economia</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0A0A0A;
      --gold:        #C9A84C;
      --gold-dim:    rgba(201,168,76,0.10);
      --gold-border: rgba(201,168,76,0.28);
      --gold-mid:    rgba(201,168,76,0.45);
      --text:        #FFFFFF;
      --muted:       #555555;
      --muted2:      #2A2A2A;
      --green:       #4caf7d;
      --green-dim:   rgba(76,175,125,0.10);
      --green-border:rgba(76,175,125,0.40);
      --red:         #e05c5c;
      --red-dim:     rgba(224,92,92,0.08);
      --red-border:  rgba(224,92,92,0.35);
      --ff-serif:    'Cormorant Garamond', Georgia, serif;
      --ff-sans:     'DM Sans', system-ui, sans-serif;
      --ff-mono:     'DM Mono', 'Courier New', monospace;
    }

    html, body {
      min-height: 100%; min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── ANIMATIONS ─────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.88); }
    }

    /* ─── LAYOUT ─────────────────────────────────────────────────────── */
    #app {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid #141414;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title {
      font-family: var(--ff-serif);
      font-size: 15px; color: var(--muted);
    }
    .header-counter {
      font-family: var(--ff-mono);
      font-size: 11px; color: var(--muted2);
    }

    main {
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 28px 20px;
      gap: 24px;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── SCREENS ────────────────────────────────────────────────────── */
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; gap: 20px; }

    /* ── Waiting ─────────────────────────────────────────────────── */
    #screen-waiting {
      align-items: center; justify-content: center;
      text-align: center; gap: 20px;
      animation: fadeUp 0.5s ease both;
    }
    .pulse-dot-wrap {
      width: 52px; height: 52px; border-radius: 50%;
      border: 1.5px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
    }
    .pulse-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s infinite;
    }
    .waiting-title {
      font-family: var(--ff-serif);
      font-size: 26px; color: var(--text);
    }
    .waiting-hint {
      color: var(--muted); font-family: var(--ff-mono);
      font-size: 12px; letter-spacing: 0.5px;
    }

    /* ── Question ────────────────────────────────────────────────── */
    .q-tag {
      font-family: var(--ff-mono); font-size: 11px;
      color: var(--gold); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 2px;
    }
    .q-title {
      font-family: var(--ff-serif);
      font-size: clamp(20px, 5vw, 26px);
      color: var(--text); line-height: 1.45;
      font-weight: 600;
    }

    /* Chart embed */
    .q-chart {
      border-radius: 10px;
      border: 1px solid #1c1c1c;
      background: #0e0e0e;
      padding: 16px 12px 8px;
      overflow: hidden;
    }
    .q-chart svg { width: 100%; height: auto; display: block; }

    /* Option buttons */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: left; width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-btn:active { transform: scale(0.985); }
    .opt-btn.selected {
      background: var(--gold-dim);
      border-color: var(--gold);
    }
    .opt-badge {
      width: 34px; height: 34px; border-radius: 6px;
      flex-shrink: 0;
      background: transparent;
      border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-mono); font-size: 13px;
      color: #444; font-weight: 500;
      transition: all 0.18s;
    }
    .opt-btn.selected .opt-badge {
      background: var(--gold); border-color: var(--gold); color: var(--bg);
    }
    .opt-btn .opt-label {
      color: #777; font-size: 15px;
      font-family: var(--ff-sans); line-height: 1.35;
      transition: color 0.18s;
    }
    .opt-btn.selected .opt-label { color: #fff; }

    /* Confirm button */
    #btn-confirm {
      background: #111; border: none;
      border-radius: 10px; padding: 16px;
      color: var(--muted2);
      font-size: 13px; font-weight: 700;
      font-family: var(--ff-mono); letter-spacing: 2px;
      cursor: default; transition: all 0.3s; width: 100%;
    }
    #btn-confirm.ready {
      background: var(--gold); color: var(--bg); cursor: pointer;
    }
    #btn-confirm.ready:active { opacity: 0.85; }

    /* ── Gabarito ────────────────────────────────────────────────── */
    #screen-gabarito { animation: fadeUp 0.4s ease both; }

    .gab-result-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 10px;
      font-family: var(--ff-mono); font-size: 13px;
      letter-spacing: 1px; font-weight: 700;
    }
    .gab-result-banner.correct {
      background: var(--green-dim); border: 1px solid var(--green-border);
      color: var(--green);
    }
    .gab-result-banner.wrong {
      background: var(--red-dim); border: 1px solid var(--red-border);
      color: var(--red);
    }
    .gab-icon {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .gab-result-banner.correct .gab-icon { background: rgba(76,175,125,0.2); }
    .gab-result-banner.wrong   .gab-icon { background: rgba(224,92,92,0.15); }

    .gab-q-tag {
      font-family: var(--ff-mono); font-size: 11px;
      color: var(--gold); letter-spacing: 3px; text-transform: uppercase;
    }

    /* Gabarito options */
    .gab-options { display: flex; flex-direction: column; gap: 8px; }

    .gab-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      border: 1px solid #181818;
      background: rgba(255,255,255,0.01);
      opacity: 0.28;
    }
    .gab-opt.student-correct {
      border-color: var(--green-border);
      background: var(--green-dim);
      opacity: 1;
    }
    .gab-opt.student-wrong {
      border-color: var(--red-border);
      background: var(--red-dim);
      opacity: 1;
    }
    .gab-opt.correct-answer {
      border-color: var(--green-border);
      background: var(--green-dim);
      opacity: 1;
    }
    .gab-badge {
      width: 30px; height: 30px; border-radius: 5px;
      flex-shrink: 0;
      border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-mono); font-size: 12px;
      color: #444; font-weight: 500;
    }
    .gab-opt.student-correct .gab-badge {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .gab-opt.student-wrong .gab-badge {
      background: var(--red); border-color: var(--red); color: #fff;
    }
    .gab-opt.correct-answer .gab-badge {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .gab-opt-label {
      font-size: 14px; color: #555;
      font-family: var(--ff-sans); line-height: 1.35;
    }
    .gab-opt.student-correct .gab-opt-label,
    .gab-opt.correct-answer .gab-opt-label { color: #ccc; }
    .gab-opt.student-wrong   .gab-opt-label { color: #aaa; }

    /* Explanation block */
    .explicacao {
      border: 1px solid #1c1c1c;
      border-left: 3px solid var(--gold-mid);
      border-radius: 0 8px 8px 0;
      background: #0d0d0d;
      padding: 14px 16px;
    }
    .explicacao-label {
      font-family: var(--ff-mono); font-size: 10px;
      color: var(--gold); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .explicacao-text {
      font-size: 14px; color: #888;
      font-family: var(--ff-sans); line-height: 1.6;
    }

    .gab-next-hint {
      text-align: center; color: var(--muted2);
      font-family: var(--ff-mono); font-size: 11px;
      letter-spacing: 0.5px; padding-top: 4px;
    }

    /* ── Results ─────────────────────────────────────────────────── */
    #screen-results { animation: fadeUp 0.4s ease both; }
    .res-tag {
      font-family: var(--ff-mono); font-size: 11px;
      color: var(--gold); letter-spacing: 3px;
      text-transform: uppercase;
    }
    .res-q {
      font-family: var(--ff-serif);
      font-size: clamp(18px, 4.5vw, 22px);
      color: var(--text); line-height: 1.45;
    }
    .res-bars { display: flex; flex-direction: column; gap: 14px; }

    .res-row { display: flex; align-items: center; gap: 12px; }
    .res-badge {
      width: 36px; height: 36px; border-radius: 6px;
      flex-shrink: 0;
      background: var(--gold-dim); border: 1.5px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-mono); font-size: 13px;
      color: var(--gold); font-weight: 500; transition: all 0.4s;
    }
    .res-row.winner .res-badge { background: var(--gold); border-color: var(--gold); color: var(--bg); }
    .res-row.gabarito-correct .res-badge { background: var(--green); border-color: var(--green); color: #fff; }

    .res-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .res-label {
      font-size: 14px; color: #666; font-family: var(--ff-sans);
      transition: color 0.4s;
    }
    .res-row.winner .res-label { color: #fff; font-weight: 500; }
    .res-row.gabarito-correct .res-label { color: var(--green); }

    .res-track {
      height: 36px; background: rgba(255,255,255,0.03);
      border-radius: 5px; overflow: hidden;
    }
    .res-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, rgba(201,168,76,0.35), rgba(201,168,76,0.55));
      border-radius: 5px; transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
    }
    .res-row.winner .res-fill { background: linear-gradient(90deg, rgba(201,168,76,0.7), var(--gold)); }
    .res-row.gabarito-correct .res-fill { background: linear-gradient(90deg, rgba(76,175,125,0.4), var(--green)); }

    .res-pct {
      width: 48px; text-align: right; flex-shrink: 0;
      font-family: var(--ff-mono); font-size: 16px;
      color: rgba(201,168,76,0.4); transition: all 0.4s;
    }
    .res-row.winner .res-pct { font-size: 20px; color: var(--gold); }
    .res-row.gabarito-correct .res-pct { color: var(--green); }

    .res-total {
      text-align: right; font-family: var(--ff-mono);
      font-size: 12px; color: var(--muted2); margin-top: 4px;
    }

    /* Gabarito block inside results */
    .res-gabarito {
      border: 1px solid #1c1c1c;
      border-left: 3px solid var(--green-border);
      border-radius: 0 8px 8px 0;
      background: #0d0d0d; padding: 14px 16px; margin-top: 4px;
    }
    .res-gabarito-label {
      font-family: var(--ff-mono); font-size: 10px;
      color: var(--green); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .res-gabarito-text {
      font-size: 14px; color: #888;
      font-family: var(--ff-sans); line-height: 1.6;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="header-title">Método e Evidência em Economia</span>
    <span class="header-counter" id="header-counter"></span>
  </header>

  <main>
    <!-- Waiting for professor -->
    <div id="screen-waiting" class="screen active">
      <div class="pulse-dot-wrap"><div class="pulse-dot"></div></div>
      <div class="waiting-title">Aguardando início</div>
      <div class="waiting-hint">o professor iniciará em breve</div>
    </div>

    <!-- Active question -->
    <div id="screen-question" class="screen">
      <div>
        <div class="q-tag" id="q-tag">Questão 1</div>
        <div class="q-title" id="q-title"></div>
      </div>
      <div id="q-chart-wrap"></div>
      <div class="options" id="options"></div>
      <button id="btn-confirm">CONFIRMAR</button>
    </div>

    <!-- Gabarito (shown immediately after vote) -->
    <div id="screen-gabarito" class="screen">
      <div class="gab-result-banner" id="gab-banner">
        <div class="gab-icon" id="gab-icon"></div>
        <span id="gab-banner-text"></span>
      </div>
      <div>
        <div class="gab-q-tag" id="gab-tag"></div>
      </div>
      <div id="gab-chart-wrap"></div>
      <div class="gab-options" id="gab-options"></div>
      <div class="explicacao">
        <div class="explicacao-label">Gabarito</div>
        <div class="explicacao-text" id="gab-explicacao"></div>
      </div>
      <div class="gab-next-hint">aguardando próxima questão</div>
    </div>

    <!-- Results (when professor reveals) -->
    <div id="screen-results" class="screen">
      <div class="res-tag">Resultados</div>
      <div class="res-q" id="res-q"></div>
      <div id="res-chart-wrap"></div>
      <div class="res-bars" id="res-bars"></div>
      <div class="res-total" id="res-total"></div>
      <div class="res-gabarito" id="res-gabarito-block" style="display:none">
        <div class="res-gabarito-label">Gabarito</div>
        <div class="res-gabarito-text" id="res-gabarito-text"></div>
      </div>
    </div>
  </main>
</div>

      'Não necessariamente — trabalhadores mais motivados podem ter se inscrito e já teriam salários maiores de qualquer forma',
      'Não, porque 6 meses é tempo insuficiente para avaliar',
      'Só se a amostra for grande o suficiente',
    ],
    gabarito: 1,  // 0-indexed → B
    explicacao: 'Sem saber o que teria acontecido com os mesmos trabalhadores na ausência do programa — o contrafactual —, não é possível atribuir o aumento ao programa. Esse é o viés de seleção.',
  },
  {
    texto: 'Qual é o desenho de pesquisa considerado o padrão-ouro para estimar o efeito causal de uma política pública?',
    opcoes: [
      'Comparar municípios que adotaram a política com os que não adotaram',
      'Acompanhar os beneficiários ao longo do tempo com dados em painel',
      'Sortear aleatoriamente indivíduos para o grupo de tratamento e controle',
      'Aplicar regressão múltipla controlando por variáveis socioeconômicas',
    ],
    gabarito: 2,  // 0-indexed → C
    explicacao: 'A randomização garante que os dois grupos sejam comparáveis em média — inclusive em características não observáveis como motivação. Isso elimina o viés de seleção e permite inferência causal limpa.',
  },
  {
    texto: 'O método de Diferenças em Diferenças estima o efeito de uma política comparando…',
    opcoes: [
      'O grupo tratado antes e depois da política',
      'O grupo tratado com o grupo de controle, após a política',
      'A mudança do grupo tratado com a mudança do grupo de controle no mesmo período',
      'A média do grupo tratado com a média nacional',
    ],
    gabarito: 2,  // 0-indexed → C
    explicacao: 'O duplo diferencial desconta da variação do grupo tratado aquilo que teria ocorrido de qualquer forma, usando o grupo de controle como referência de tendência.',
  },
  {
    texto: 'Um pesquisador divide 200 estudantes aleatoriamente em dois grupos. O grupo A recebe aulas de reforço em matemática; o grupo B continua com as aulas normais. Após 3 meses, o grupo A teve nota média 7,2 e o grupo B teve nota média 6,1. Qual é o papel do grupo B neste experimento?',
    opcoes: [
      'Grupo de tratamento — recebeu a intervenção experimental',
      'Grupo de controle — serve de referência para medir o efeito do reforço',
      'Grupo placebo — recebeu um tratamento alternativo inerte',
      'Grupo histórico — representa o desempenho dos alunos antes do programa',
    ],
    gabarito: 1,  // 0-indexed → B
    explicacao: 'O grupo de controle é o contrafactual observado: permite estimar o que teria acontecido com o grupo de tratamento na ausência da intervenção. A diferença de notas (7,2 − 6,1 = 1,1 ponto) é o estimador causal do efeito das aulas de reforço.',
  },
  {
    texto: 'No capítulo 2, Rosen descreve um estudo clássico do século XIX em que um médico investigou a causa de uma epidemia de cólera em Londres sem saber que germes existiam. Como ele conseguiu isolar a causa?',
    opcoes: [
      'Aplicou um questionário aos moradores de diferentes bairros sobre hábitos de higiene',
      'Comparou a taxa de mortalidade de bairros ricos e pobres da cidade',
      'Explorou o fato de duas companhias de água abastecidas de fontes diferentes serviam casas lado a lado na mesma rua',
      'Realizou experimentos laboratoriais com amostras de água dos rios',
    ],
    gabarito: 2,  // 0-indexed → C
    explicacao: 'John Snow percebeu que a distribuição das companhias de água entre as casas era essencialmente aleatória — ricos e pobres, lado a lado, recebendo água de fontes distintas. Isso replicou virtualmente uma randomização, permitindo atribuir causalmente a cólera à água contaminada.',
  },
];

const LABELS = ['A', 'B', 'C', 'D', 'E', 'F'];

// ─── LOCAL STATE ──────────────────────────────────────────────────────────────
let currentQ    = 0;
let revealed    = false;
let selectedOpt = null;
let lastVotedOpt = null;  // index of option student voted for
let pollTimer   = null;
let prevQ       = 0;

function votedKey(q)   { return `votou_${SESSAO}_${q}`; }
function votedOptKey(q){ return `votou_opt_${SESSAO}_${q}`; }
function hasVoted(q)   { return !!localStorage.getItem(votedKey(q)); }
function getVotedOpt(q){ const v = localStorage.getItem(votedOptKey(q)); return v !== null ? parseInt(v) : null; }
function markVoted(q, opt) {
  localStorage.setItem(votedKey(q),    '1');
  localStorage.setItem(votedOptKey(q), String(opt));
}

// ─── DOM ──────────────────────────────────────────────────────────────────────
const screens = {
  waiting:  document.getElementById('screen-waiting'),
  question: document.getElementById('screen-question'),
  gabarito: document.getElementById('screen-gabarito'),
  results:  document.getElementById('screen-results'),
};
const headerCounter  = document.getElementById('header-counter');
const qTag           = document.getElementById('q-tag');
const qTitle         = document.getElementById('q-title');
const qChartWrap     = document.getElementById('q-chart-wrap');
const optionsEl      = document.getElementById('options');
const btnConfirm     = document.getElementById('btn-confirm');
const gabBanner      = document.getElementById('gab-banner');
const gabIcon        = document.getElementById('gab-icon');
const gabBannerText  = document.getElementById('gab-banner-text');
const gabTag         = document.getElementById('gab-tag');
const gabChartWrap   = document.getElementById('gab-chart-wrap');
const gabOptions     = document.getElementById('gab-options');
const gabExplicacao  = document.getElementById('gab-explicacao');
const resQ           = document.getElementById('res-q');
const resChartWrap   = document.getElementById('res-chart-wrap');
const resBars        = document.getElementById('res-bars');
const resTotal       = document.getElementById('res-total');

// ─── SCREEN SWITCHER ──────────────────────────────────────────────────────────
function show(name) {
  Object.entries(screens).forEach(([k, el]) => {
    el.classList.toggle('active', k === name);
  });
}

// ─── RENDER QUESTION ──────────────────────────────────────────────────────────
function renderQuestion(qNum) {
  const pergunta = PERGUNTAS[qNum - 1];
  qTag.textContent   = `Questão ${qNum}`;
  qTitle.textContent = pergunta.texto;
  headerCounter.textContent = `${qNum} / ${PERGUNTAS.length}`;

  // Chart
  qChartWrap.innerHTML = '';
  if (pergunta.svg) {
    const wrap = document.createElement('div');
    wrap.className = 'q-chart';
    wrap.innerHTML = pergunta.svg;
    qChartWrap.appendChild(wrap);
  }

  selectedOpt = null;
  optionsEl.innerHTML = '';

  pergunta.opcoes.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `
      <span class="opt-badge">${LABELS[i]}</span>
      <span class="opt-label">${escHtml(opt)}</span>
    `;
    btn.addEventListener('click', () => selectOption(btn, i));
    optionsEl.appendChild(btn);
  });

  btnConfirm.className = '';
  btnConfirm.id = 'btn-confirm';
  btnConfirm.disabled = true;
  show('question');
}

function selectOption(btn, idx) {
  optionsEl.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOpt = idx;
  btnConfirm.classList.add('ready');
  btnConfirm.disabled = false;
}

// ─── RENDER GABARITO ──────────────────────────────────────────────────────────
function renderGabarito(qNum, studentOpt) {
  const pergunta   = PERGUNTAS[qNum - 1];
  const correctIdx = pergunta.gabarito;
  const isCorrect  = studentOpt === correctIdx;

  headerCounter.textContent = `${qNum} / ${PERGUNTAS.length}`;
  gabTag.textContent = `Questão ${qNum}`;

  // Banner
  gabBanner.className = `gab-result-banner ${isCorrect ? 'correct' : 'wrong'}`;
  gabIcon.textContent  = isCorrect ? '✓' : '✗';
  gabBannerText.textContent = isCorrect ? 'Correto!' : 'Incorreto';

  // Chart
  gabChartWrap.innerHTML = '';
  if (pergunta.svg) {
    const wrap = document.createElement('div');
    wrap.className = 'q-chart';
    wrap.innerHTML = pergunta.svg;
    gabChartWrap.appendChild(wrap);
  }

  // Options
  gabOptions.innerHTML = '';
  pergunta.opcoes.forEach((opt, i) => {
    const div = document.createElement('div');
    let cls = 'gab-opt';
    if (i === studentOpt && i === correctIdx) cls += ' student-correct';
    else if (i === studentOpt)                cls += ' student-wrong';
    else if (i === correctIdx)                cls += ' correct-answer';
    div.className = cls;
    div.innerHTML = `
      <div class="gab-badge">${LABELS[i]}</div>
      <div class="gab-opt-label">${escHtml(opt)}</div>
    `;
    gabOptions.appendChild(div);
  });

  // Explanation
  gabExplicacao.textContent = pergunta.explicacao;

  show('gabarito');
}

// ─── RENDER RESULTS ──────────────────────────────────────────────────────────
async function renderResults(qNum) {
  const pergunta   = PERGUNTAS[qNum - 1];
  const correctIdx = pergunta.gabarito;
  resQ.textContent = pergunta.texto;

  // Chart
  resChartWrap.innerHTML = '';
  if (pergunta.svg) {
    const wrap = document.createElement('div');
    wrap.className = 'q-chart';
    wrap.innerHTML = pergunta.svg;
    resChartWrap.appendChild(wrap);
  }

  const votos = await getVotos(qNum);
  const total = votos.length;
  const counts = {};
  votos.forEach(v => { counts[v.opcao] = (counts[v.opcao] || 0) + 1; });
  const maxVotes = total > 0 ? Math.max(...Object.values(counts)) : 0;

  resBars.innerHTML = '';
  const correctCount = counts[correctIdx + 1] || 0;
  const wrongCount   = total - correctCount;
  const correctPct   = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  if (total > 0) {
    resTotal.innerHTML = `${total} resposta${total !== 1 ? 's' : ''} &nbsp;·&nbsp; `
      + `<span style="color:var(--green)">✓ ${correctCount} acertaram (${correctPct}%)</span>`
      + ` &nbsp;·&nbsp; <span style="color:#555">✗ ${wrongCount} erraram</span>`;
  } else {
    resTotal.textContent = 'sem respostas';
  }

  pergunta.opcoes.forEach((opt, i) => {
    const idx   = i + 1;
    const count = counts[idx] || 0;
    const pct   = total > 0 ? Math.round((count / total) * 100) : 0;
    const barW  = maxVotes > 0 ? (count / maxVotes) * 100 : 0;
    const isWinner   = maxVotes > 0 && count === maxVotes;
    const isCorrect  = i === correctIdx;

    const row = document.createElement('div');
    let rowCls = 'res-row';
    if (isCorrect) rowCls += ' gabarito-correct';
    else if (isWinner) rowCls += ' winner';
    row.className = rowCls;
    row.style.animation = `fadeUp 0.4s ease ${i * 0.07}s both`;
    row.innerHTML = `
      <div class="res-badge">${LABELS[i]}</div>
      <div class="res-col">
        <div class="res-label">${escHtml(opt)}</div>
        <div class="res-track">
          <div class="res-fill" style="width:${barW}%"></div>
        </div>
      </div>
      <div class="res-pct">${pct}%</div>
    `;
    resBars.appendChild(row);
  });

  // Show explanation in results too
  const gabBlock = document.getElementById('res-gabarito-block');
  document.getElementById('res-gabarito-text').textContent = pergunta.explicacao;
  gabBlock.style.display = '';

  headerCounter.textContent = `${qNum} / ${PERGUNTAS.length}`;
  show('results');
}

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
async function getEstado() {
  const { data, error } = await sb
    .from('enquete_estado')
    .select('questao_ativa, revelada')
    .eq('sessao', SESSAO)
    .maybeSingle();
  if (error) { console.warn(error); return null; }
  return data;
}

async function insertVoto(questao, opcao) {
  const { error } = await sb
    .from('enquete_respostas')
    .insert({ sessao: SESSAO, questao, opcao });
  if (error) throw error;
}

async function getVotos(questao) {
  const { data, error } = await sb
    .from('enquete_respostas')
    .select('opcao')
    .eq('sessao', SESSAO)
    .eq('questao', questao);
  if (error) { console.warn(error); return []; }
  return data || [];
}

// ─── POLL LOOP ────────────────────────────────────────────────────────────────
async function tick() {
  const estado = await getEstado();
  if (!estado) return;

  const q = estado.questao_ativa;
  const r = estado.revelada;

  if (q !== prevQ) {
    prevQ = q;
    selectedOpt = null;
    lastVotedOpt = null;
  }

  currentQ = q;
  revealed = r;

  if (q === 0) {
    headerCounter.textContent = '';
    show('waiting');
    return;
  }

  const voted    = hasVoted(q);
  const votedOpt = getVotedOpt(q);

  if (r) {
    // Professor revealed — show full results
    await renderResults(q);
    return;
  }

  if (voted && votedOpt !== null) {
    // Already voted, not yet revealed — show gabarito
    headerCounter.textContent = `${q} / ${PERGUNTAS.length}`;
    // Only re-render if we just transitioned or it's not already showing
    if (!screens.gabarito.classList.contains('active')) {
      renderGabarito(q, votedOpt);
    }
    return;
  }

  // Active question, not voted
  if (q !== parseInt((qTag.textContent || '').replace('Questão ', '')) ||
      !screens.question.classList.contains('active')) {
    renderQuestion(q);
  }
}

// ─── CONFIRM VOTE ──────────────────────────────────────────────────────────────
btnConfirm.addEventListener('click', async () => {
  if (selectedOpt === null || !btnConfirm.classList.contains('ready')) return;
  if (hasVoted(currentQ)) {
    const opt = getVotedOpt(currentQ);
    if (opt !== null) renderGabarito(currentQ, opt);
    return;
  }

  btnConfirm.disabled = true;
  btnConfirm.textContent = 'ENVIANDO…';

  try {
    await insertVoto(currentQ, selectedOpt + 1);
    markVoted(currentQ, selectedOpt);
    lastVotedOpt = selectedOpt;
    renderGabarito(currentQ, selectedOpt);
  } catch (err) {
    console.error(err);
    btnConfirm.textContent = 'ERRO — TENTE NOVAMENTE';
    btnConfirm.disabled = false;
  }
});

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await tick();
  pollTimer = setInterval(tick, 2000);
}

init();
</script>
